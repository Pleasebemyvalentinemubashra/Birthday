services:
  - type: web
    name: birthday-scrapbook
    env: node
    nodeVersion: 18.20.0
    plan: free
    buildCommand: npm install --production=false && cd frontend && npm install --production=false && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RECIPIENT
        value: Sofia
      - key: AGE
        value: "19"
      - key: SENDER
        value: Marco
      - key: ADMIN_KEY
        value: change-this-to-something-secret
      - key: PORT
        value: "3000"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
